global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'meridian-marketdata'
    static_configs:
      - targets: ['marketdata:9100']

  - job_name: 'meridian-pricing'
    static_configs:
      - targets: ['pricing:9101']

  - job_name: 'meridian-risk'
    static_configs:
      - targets: ['risk:9102']
