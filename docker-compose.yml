version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 5s
      timeout: 3s
      retries: 5

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Meridian_Dev_123!"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Meridian_Dev_123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: /opt/mssql-tools18/bin/sqlcmd
    command: -S sqlserver -U sa -P "Meridian_Dev_123!" -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'Meridian') CREATE DATABASE Meridian"
    restart: "no"

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"
      - "8081:80"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    environment:
      TWS_USERID: "${IB_USERNAME:-}"
      TWS_PASSWORD: "${IB_PASSWORD:-}"
      TRADING_MODE: "${IB_TRADING_MODE:-paper}"
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "yes"
    ports:
      - "4002:4002"
    profiles: ["live"]
    restart: unless-stopped

  marketdata:
    build:
      context: .
      dockerfile: src/Meridian.MarketData/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9100:9100"
      - "8090:8090"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      MARKET_DATA_MODE: "${MARKET_DATA_MODE:-Simulated}"
      SEQ_URL: http://seq:5341

  pricing:
    build:
      context: .
      dockerfile: src/Meridian.Pricing/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      sql-init:
        condition: service_completed_successfully
    ports:
      - "9101:9101"
      - "8091:8091"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      SQL_CONNECTION: "Server=sqlserver,1433;Database=Meridian;User Id=sa;Password=Meridian_Dev_123!;TrustServerCertificate=true"
      SEQ_URL: http://seq:5341

  risk:
    build:
      context: .
      dockerfile: src/Meridian.Risk/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      sql-init:
        condition: service_completed_successfully
    ports:
      - "9102:9102"
      - "8092:8092"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_CONNECTION: redis:6379
      SQL_CONNECTION: "Server=sqlserver,1433;Database=Meridian;User Id=sa;Password=Meridian_Dev_123!;TrustServerCertificate=true"
      SEQ_URL: http://seq:5341

  scenarios:
    build:
      context: .
      dockerfile: src/Meridian.Scenarios/Dockerfile
    depends_on:
      sql-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      SQL_CONNECTION: "Driver={ODBC Driver 18 for SQL Server};Server=sqlserver,1433;Database=Meridian;Uid=sa;Pwd=Meridian_Dev_123!;TrustServerCertificate=yes"

  dashboard:
    build:
      context: .
      dockerfile: src/Meridian.Dashboard/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      sql-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      REDIS_CONNECTION: redis:6379
      KAFKA_BOOTSTRAP: kafka:29092
      SQL_CONNECTION: "Server=sqlserver,1433;Database=Meridian;User Id=sa;Password=Meridian_Dev_123!;TrustServerCertificate=true"
      SCENARIOS_URL: http://scenarios:8000
      ASPNETCORE_URLS: http://+:8080
